<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Main sticky note body -->
  <rect x="64" y="64" width="384" height="384" fill="#FFD93D" stroke="#E6C200" stroke-width="8" rx="8"/>
  
  <!-- Folded corner -->
  <path d="M 448 384 L 448 448 L 384 448 Z" fill="#FFC700"/>
  <path d="M 448 384 L 448 448 L 384 448 Z" fill="none" stroke="#E6C200" stroke-width="8" stroke-linejoin="round"/>
  
  <!-- Horizontal lines (like ruled paper) -->
  <line x1="96" y1="160" x2="416" y2="160" stroke="#E6C200" stroke-width="3" opacity="0.3"/>
  <line x1="96" y1="220" x2="416" y2="220" stroke="#E6C200" stroke-width="3" opacity="0.3"/>
  <line x1="96" y1="280" x2="416" y2="280" stroke="#E6C200" stroke-width="3" opacity="0.3"/>
  <line x1="96" y1="340" x2="416" y2="340" stroke="#E6C200" stroke-width="3" opacity="0.3"/>
  
  <!-- Shadow effect -->
  <rect x="64" y="64" width="384" height="384" fill="none" stroke="#000" stroke-width="2" opacity="0.1" rx="8"/>
</svg>
